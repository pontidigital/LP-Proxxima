[build]
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://d335luupugsy2.cloudfront.net https://api.rd.services https://www.googletagmanager.com https://www.google-analytics.com https://connect.facebook.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://*.supabase.co https://api.rd.services https://www.rdstation.com.br https://n8n.proxxima.net https://connect.facebook.net https://www.facebook.com; img-src 'self' data: https:; frame-src 'self' https://www.googletagmanager.com https://www.facebook.com;"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
